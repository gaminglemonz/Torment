function createPixels(bitmap, palette, pixelSize, x=0, y=0){
    for (let i = 0; i < bitmap.length; i ++){
        for (let j = 0; j < bitmap[i].length; j ++){
            if (bitmap[i][j] !== ' '){
            	pushMatrix();
            	translate(x, y)
                fill(palette[bitmap[i][j]]);
                rect(Math.floor(j * pixelSize), Math.floor(i * pixelSize), pixelSize, pixelSize);
                popMatrix();
            }
        }
    }
}

	return {
		hitbox: function(obj, x=0, y=0, mode=0){
			noFill();
			stroke(255, 0, 0);
			strokeWeight(1);
			rectMode(CORNER)

		},
		dist: function(a, b){
			return Math.sqrt(Math.pow((b.x - a.x), 2) + Math.pow((b.y - a.y), 2));
		},
		radToDeg: function(angle){
			return angle * (180 / Math.PI)
		},
		degToRad: function(angle){
			return angle * (Math.PI / 180);
		},
		lerp: function(a, b, t){
		    return a + (b - a) * t;
		},
	};
})();

const Display = (function(){
	return {
		text: function(msg, x, y, format='', size=16, font='Silkscreen', spacing=24, align='left', width){
			// Provides a way to do newline text cause it's not... there some for reason?
			ctx.font = `${format} ${size}px ${font}`;
			ctx.textAlign = align;
			
			const lines = msg.split("\n");
			for (let i = 0; i < lines.length; i ++){
				ctx.fillText(lines[i], x, y + i * spacing, width);
			}
		},
	};
})();

const Collisions = (function(){
	return {
		rectRect: function(a, b){
			return a.x + a.w > b.x && a.x < b.x + b.w &&
           		   a.y + a.h > b.y && a.y < b.y + b.h;
		},
		circRect: function(c, r){
			
		},
		apply: function(game, target, vx, vy, categories){
			Object.keys(categories).forEach(category => {
				game[category].forEach(obj => {
					if (this.rectRect(target, obj)){
						if (categories[category].effect === 'collide' && !obj.passThrough){
							if (vx > 0){
	                            target.v.x = 0;
	                            target.x = obj.x - target.w;
	                        }
	                        if (vx < 0){
	                            target.v.x = 0;
	                            target.x = obj.x + obj.w;
	                        }
	                        if (vy > 0){
	                            target.v.y = 0;
	                            target.y = obj.y - target.h;
	                            target.falling = false;
	                            if (target === game.player && obj.type === 'soul_sand'){
	                            	game.player.speed = 5;
	                            } else {
	                            	game.player.speed = game.player.maxSpeed;
	                            }
	                        }
	                        if (vy < 0){
	                            target.v.y = 0;
	                            target.y = obj.y + obj.h;
	                            target.falling = true;
	                        }
	                        
						} else if (typeof categories[category].effect === 'function'){
							categories[category].effect();
						}
	                    if (category === "blocks"){
	                     	if (obj.type === 'lava' && target.type !== 'magma'){
	                     		target.v.y = 1;
	                      		target.falling = true;
	                       		if (!target.onFire && target.v.y >= 0.7) target.fireTimer = target.maxFireTime || 240;
	                       		
	                      		if (target === game.player){

		                      		}
	                      		}
	                       	} else if (obj.type.includes('fire')){
	                       		if (target.type !== 'magma' && !target.onFire){
			    					if (target === game.player) game.deathMessage = 'tried to swim in lava';
	                       			target.fireTimer = target.maxFireTime || 240;
	                       		}
	                       	}
			            }
					}
				});

	};

class Keys {
    constructor(){
        this.keys = {
        	'up': ['ArrowUp', 'KeyW'],
        	'down': ['ArrowDown', 'KeyS'],
        	'left': ['ArrowLeft', 'KeyA'],
        	'right': ['ArrowRight', 'KeyD'],
        	'zoomIn': ['KeyC'],
        	'zoomOut': ['KeyX'],
        	'buttonUp': ['KeyJ'],
        	'buttonDown': ['KeyK'],
        	'interact': ['KeyE'],
        	'sprint': ['ShiftLeft'],
        	'enter': ['Enter'],
        	'1': ['Digit1'],
        	'2': ['Digit2'],
        	'3': ['Digit3'],
        };
        
        this.pressed = {};
        this.released = {};
        this.clicked = {};
        
        document.addEventListener('keyup', (e) => {
            delete this.pressed[e.code];
            this.released[e.code] = true;
        });
        document.addEventListener('keydown', (e) => {
            this.pressed[e.code] = true;
            this.clicked[e.code] = true;
            
        });
    }
    update(){
        for (let k in this.clicked) delete this.clicked[k];
        for (let k in this.released) delete this.released[k];
    }
    keyByValue(obj, v){
        return Object.keys(obj).find(k => obj[k].includes(v));
    }
    getAction(action, key){
        for (let k in this.keys){
                for (let v = 0; v < this.keys[k].length; v ++){
                const value = this.keys[k][v];
                if (value in action){
                    const act = this.keyByValue(this.keys, value);
                    if (act === key) return true;
                }
            }
        }
        return false;
    }
    press(key){
        return this.getAction(this.pressed, key);
    }
    release(key){
        return this.getAction(this.released, key);
    }
    click(key){
        return this.getAction(this.clicked, key);
    }
}
let keys = new Keys();

class Mouse {
    constructor(config){
        this.x = mouseX;
        this.y = mouseY;
        
        this.clicked = false;
        this.released = false;
        this.pressed = false;
        
        this.cam = config.cam;
        
        document.addEventListener('mouseup', () => {
            this.released = true;
            this.clicked = false;
            this.pressed = false;
        });
        document.addEventListener('mousedown', () => {
            this.released = false;
            this.clicked = true;
            this.pressed = true;
        });
    }
    update(){
        this.x = mouseX;
        this.y = mouseY;
        this.clicked = false;
        this.released = false;
    }
    intersects(shape, obj){
        if (shape === 'rect'){
            return this.x > obj.x && this.x < obj.x + obj.w &&
                   this.y > obj.y && this.y < obj.y + obj.h;
        } else if (shape === 'circle') {
            const r = obj.sz ? obj.sz / 2 : Math.max(obj.w, obj.h) / 2;
            return Funcs.dist(this, obj) <= r;
        }
        return;
    }
}
let mouse = new Mouse({ cam: null });

class AnimatedArt {
    constructor(frames, delay=60, bounce=false, offset={x: 0, y: 0}, w, h){
        this.frames = frames;
        this.curFrame = 0;
        this.maxFrames = this.frames.length;
        this.delay = delay;
        this.timer = this.delay;
        this.bounce = bounce;
        this.dir = 1;
        
        this.w = w;
        this.h = h;
        this.offset = offset;
    }
    update(){
        if (this.timer <= 0){
            if (!this.bounce){
                if (this.curFrame < this.maxFrames - 1) {
                    this.curFrame ++;
                } else {
                    this.curFrame = 0;
                }
            } else {
                if (this.curFrame === this.maxFrames - 1){
                    this.dir = -1;
                } else if (this.curFrame === 0){
                    this.dir = 1;
                }
                this.curFrame += this.dir;
            }
            this.timer = this.delay;
        }
        this.timer --;
    }
    display(){
        image(this.frames[this.curFrame], this.offset.x, this.offset.y, this.w, this.h);
        this.update()
    }
    setFrames(frames){
        this.frames = frames;
        this.maxFrames = frames.length;
        // this.curFrame = 0;
    }
}

class Fire {
	constructor(config){
		this.x = config.x;
		this.y = config.y;
		this.w = config.w || BLOCKSIZE;
		this.h = config.h || BLOCKSIZE;
		this.type = config.type;
	}
	initAnimation(){		
		if (this.type === 'regular') {
			this.frames = Array.from({ length: 6, }, (_, i) => imgs.blocks[`fire_${i}`]);
		} else if (this.type === 'soul'){
			this.frames = Array.from({ length: 6, }, (_, i) => imgs.blocks[`soul_fire_${i}`]);
		}
		this.animation = new AnimatedArt(this.frames, 5, false, { x: this.x, y: this.y }, this.w, this.h);
	}
	setType(type){
		this.init = false;
		this.type = type;
	}
	display(){
		if (this.init){
			if (this.type === 'regular') {
				this.frames = Array.from({ length: 6, }, (_, i) => imgs.blocks[`fire_${i}`]);
			} else if (this.type === 'soul'){
				this.frames = Array.from({ length: 6, }, (_, i) => imgs.blocks[`soul_fire_${i}`]);
			}
			imageMode(CORNER)
			this.animation.display();
		} else {
			this.initAnimation();
			this.init = true;
		}
	}
}

class Particle {
	constructor(game, config){
		this.executable = 'run';
		
		this.x = config.x || 0;
		this.y = config.y || 0;
		
		this.img = config.img;
		
		this.game = game;
		
		this.lifetime = config.lifetime || 120;
		
		// Custom Configuration
		this.showFade = config.showFade || false;
		this.animateSz = config.animateSz || false;
		this.applyGrav = config.applyGrav;
		this.damage = config.damage;
		this.target = config.target;
		this.xp = config.xp;
		
		this.maxSz = config.sz;
		this.sz = config.sz || 16;
		this.w = this.sz, this.h = this.sz;
		this.v = { x: config.v.x, y: config.v.y, };
		this.static = config.static;
	}
	display(){
		if (this.showFade) tint(255, 255, 255, map(this.lifetime, 0, 180, 0, 255));
		imageMode(CORNER)
		image(this.img, this.x, this.y, this.sz, this.sz);
		noTint();
		if (this.animateSz){
			this.sz = map(this.lifetime, 0, 180, this.maxSz / 2, this.maxSz);
		}
	}
	update(){
		this.x += this.v.x;
		if (!this.static) {
		    Collisions.apply(this.game, this, this.v.x, 0, {
				"blocks": { effect: 'collide' },
		    })
		}
		
		this.y += this.v.y;
		if (this.applyGrav) {
			this.v.y += GRAV;
			this.v.x = Funcs.lerp(this.v.x, 0, 0.05);
		}
		if (!this.static) {
		    Collisions.apply(this.game, this, 0, this.v.y, {
				"blocks": { effect: 'collide' },
		    })
		}
		
		if (this.damage){
			if (Collisions.rectRect(this, this.target)){
				this.target.takeDamage(this.damage);
				
			    this.game.deathMessage = 'was killed by magic';
				this.dead = true;
			}
		}
		if (this.xp){
			if (Collisions.rectRect(this, this.game.player)){
				this.game.player.xp += 5 * this.game.player.xpMultiplier;
				this.dead = true;
			}
		}
		if (this.lifetime <= 0) this.dead = true;
		this.lifetime --;
	}
	run(){
		this.display();
		// if (this.game.levelTransition.done) {
			this.update();
		// }
	}
}

class Projectile {
    constructor(game, config){
        this.executable = 'run'
        
        this.game = game;
        
        this.x = config.x || 0;
        this.y = config.y || 0;
        this.sz = config.sz;
        this.w = this.sz, this.h = this.sz;
        
        this.v = { x: 0, y: 0 };
        this.speed = config.speed;
        this.applyGrav = config.applyGrav;
        
        this.fireball = config.fireball;
        
        this.damage = config.damage;
        
        this.angle = config.angle;
        this.img = config.img;
    }
    display(){
        image(this.img, this.x, this.y, this.sz, this.sz)
        if (this.fireball){
        	this.game.particles.push(new Particle(this.game, { x: random(this.x - 10, this.x + this.w + 10), y: random(this.y + this.h/2, this.y + this.h), v: { x: random(-0.5, 0.5), y: random(-1, -0.1) }, speed: 0, img: imgs.particles.fire, sz: random(16, 32), animateSz: true, }));
        }
        Funcs.hitbox(this)
    }
    update(){
        this.v.x += Math.cos(this.angle) * this.speed;
        this.x += this.v.x;
        
        this.v.y += Math.sin(this.angle) * this.speed;
        this.y += this.v.y;
        Collisions.apply(this.game, this, this.v.x, this.v.y, {
            "blocks": { effect: () => this.dead = true },
        })
        
        if (Collisions.rectRect(this, this.game.player)){
        	this.game.player.takeDamage(this.damage)
        	if (this.fireball) {
        		this.game.player.fireTimer = this.game.player.maxFireTime;	
			    this.game.deathMessage = 'was set ablaze';
        	}
        	this.dead = true;
        }
    }
    run(){
        this.update();
        this.display();
    }
}

    	this.health = constrain(this.health, 0, this.maxHealth);
        this.displayHealth = this.health / 2;
        this.healthFlashTimer --;
        this.damageTintTimer --;
        
        if (this.health <= 0) {
        	this.dead = true; this.health = 0;
        }
        if (frameCount % this.regenTime === 0 && this.health < this.maxHealth){
        	this.health ++;
        	this.healthFlashTimer = 10;
        }
        
    }

            break;

				this.rigs.arms.lower[0] = Funcs.lerp(this.rigs.arms.lower[0], -145, 0.1);

			   this.rigs.legs.upper[0] = Funcs.lerp(this.rigs.legs.upper[0], 36, 0.2);
			break;
			case "kick-2":
			   this.rigs.legs.upper[0] = Funcs.lerp(this.rigs.legs.upper[0], -80, 0.2);
			break;
	    }
	}
	handleScale(){
		if (this.dir === 'right'){
	        this.targetW = Funcs.lerp(this.targetW, 1, 0.1);
		} else if (this.dir === 'left') {
	        this.targetW = Funcs.lerp(this.targetW, -1, 0.1);
		}
	}
	reset(death){
		this.dead = false;
		this.fireTimer = 0;
		this.onFire = false;
		this.v = { x: 0, y: 0 };
		this.x = this.setX + BLOCKSIZE;
		this.y = this.setY - 200;
		this.health = 20;
	}
	attack(type){
		switch (type){
			case "punch":
				
				if (this.fist.timer < 30 && this.fist.timer > 15){
				    this.animateRigs("punch-1");
					
					this.fist.x = lerp(this.fist.x, -87 * this.targetW, 0.1)
					this.fist.y = lerp(this.fist.y, 161, 0.1)
				} else if (this.fist.timer > 0 && this.fist.timer < 15){
				    this.animateRigs("punch-2");
					
					this.game.enemies.forEach(e => {
	    				if (Collisions.rectRect({ x: this.fist.x + this.x, y: this.fist.y + this.y, w: 40, h: 40 }, e) && !this.fist.hit){
	    				    e.takeDamage(5 * this.strength);
	    				    this.fist.hit = true;
	    				}
					});
					this.fist.x = lerp(this.fist.x, 189 * this.targetW, 0.1)
				}
				
				if (this.fist.timer <= 0){
					this.fist.active = false;
					this.fist.hit = false;
					this.fist.timer = 30;
				
				}
				
				
				this.fist.timer --;
			break;
			case "kick":
				
				if (this.kick.timer < 30 && this.kick.timer > 15){
				    this.animateRigs("kick-1");
					
					this.kick.x = lerp(this.kick.x, -87 * this.targetW, 0.1)
					this.kick.y = lerp(this.kick.y, 274, 0.1)
				} else if (this.kick.timer > 0 && this.kick.timer < 15){
				    this.animateRigs("kick-2");
					
					this.game.enemies.forEach(e => {
	    				if (Collisions.rectRect({ x: this.kick.x + this.x, y: this.kick.y + this.y, w: 40, h: 40 }, e) && !this.kick.hit){
	    				    e.takeDamage(5 * this.strength);
	    				    this.kick.hit = true;
	    				}
					});
					this.kick.x = lerp(this.kick.x, 189 * this.targetW, 0.1)
				}
				
				if (this.kick.timer <= 0){
					this.kick.active = false;
					this.kick.hit = false
					this.kick.timer = 30;
				}
				
				
				this.kick.timer --;
			break;
			case "one-hand-sword":
				
			break;
			case "two-hand-sword":
				
			break;
		}
	}
	handleXp(){
		if (this.xp >= this.game.xpGoals[this.level]){
			this.game.upgradeSet.visible = true;
			this.xp = 0;
			this.level ++;
		}
		this.displayXp = Funcs.lerp(this.displayXp, this.xp, 0.05);
	}
	update(){
		this.animateRigs("kick");
	    if (keys.press("right")){
	        this.v.x = Funcs.lerp(this.v.x, this.speed, 0.05);
	        this.dir = 'right'
	        this.animateRigs("walk")
	    } else if (keys.press("left")){
	        this.v.x = Funcs.lerp(this.v.x, -this.speed, 0.05);
	        this.dir = 'left'
	        this.animateRigs("walk")
	    } else {
	        this.v.x = Funcs.lerp(this.v.x, 0, 0.15);
	        this.animateRigs("rest")
	    }
	    if (keys.press("sprint") && this.stamina > 0){
	    	this.speed = this.maxSpeed + 4;
	    	this.stamina -= 0.2;
	    } else {
	    	this.speed = this.maxSpeed;
	    	this.stamina += 0.1;
	    }
	    this.stamina = constrain(this.stamina, 0, this.maxStamina);
	    this.x += this.v.x;
	    Collisions.apply(this.game, this, this.v.x, 0, {
			"blocks": { effect: 'collide' },
			"shrines": { effect: 'collide' },
	    })
	    
	    if (keys.press("up") && !this.falling) {
	    	this.v.y = -12;
	    	this.falling = true;
	    }
	    if (this.v.y > 0.7) {
	        this.animateRigs("fall")
	    } else if (this.v.y < -0.1) {
	        this.animateRigs("jump")
	    }
	    this.y += this.v.y;
	    this.v.y += GRAV;
	    Collisions.apply(this.game, this, 0, this.v.y, {
			"blocks": { effect: 'collide' },
			"particles": { effect: function(){ this.health -= 0.1; }, typeCondition: "soul_fire" },
	    })
		if (mouse.clicked && this.fist.cooldown <= 0 && !this.fist.active) {
			this.fist.active = true;
		}
		
		if (this.fist.active) {
			this.attack("punch")
		}
		
		if (keys.press("down") && this.kick.cooldown <= 0 && !this.kick.active) {
			this.kick.active = true;
		}
		
		if (this.kick.active) {
			this.attack("kick")
		}
		
		this.fist.cooldown --;
		
		const maxX = this.game.map[0].length * BLOCKSIZE; // levels max width
		this.x = constrain(this.x, 0, maxX + 1)
		if (this.x >= maxX && (this.game.sector !== 5 || this.game.enemies.length === 0)){
			this.game.loadLevel(1);
		}
		
		this.handleXp();
		this.handleScale();
		this.handleHealth();
	}
	run(){
		if (this.game.active) {
			this.update();
		}
		this.display();
	}
}

class Enemy {
	constructor(config){
		this.executable = 'run';
		
		this.x = config.x || 0;
		this.y = config.y || 0;
		this.w = config.w;
		this.h = config.h;
		
		this.health = config.health || 100;
		this.type = config.type;
		this.healthTintTimer = 0;
		
		this.xp = config.xp || random(3, 5);
	}
	display(){
// 		if (!this.animated) {
// 		}
		fill(255, 0, 0);
		rect(this.x, this.y, this.w, this.h)
		
			// image(imgs.enemies[this.type], this.x, this.y);
	}
	takeDamage(amt){
	    this.health -= this.game.debug.onePunch ? this.health : amt * this.game.player.strength;
	    this.healthTintTimer = 15;
	}
	handleHealth(){
		if (this.health <= 0){
			this.dead = true;
		}
	}
	
	// Draws overlays like fire and damage tint for all enemies
	damageOverlay(){
		
	  	if (this.healthTintTimer > 0) {
	  		tint(255, 200, 200, 255);
	  	} else {
	  		tint(255, 255, 255, 255);
	  	}
	}
	
	initFireAnimation(){		
		this.fireFrames = Array.from({ length: 6, }, (_, i) => imgs.blocks[`fire_${i}`]);
		this.fire = new AnimatedArt(this.fireFrames, 5, false, { x: this.x, y: this.y }, this.w, this.h);
	}
	fireOverlay(){
		imageMode(CORNER)
	  	if (this.fireTimer > 0){
	  		this.onFire = true;
	  		if (this.fireTimer % 40 === 0 && this.fireTimer !== this.maxFireTime){
	  			this.takeDamage(2 * this.fireDamage)
	  		}
	  		if (this.fireInit){
	  			this.fire.display()
	  			this.fire.offset = { x: this.x, y: this.y };
	  		} else {
	  			this.initFireAnimation();
	  			this.fireInit = true;
	  		}
	  	} else {
	  		this.onFire = false;
	  	}
	  	this.fireTimer --;
	}
	run(){
		this.damageOverlay();
		this.display();
		noTint();
		this.fireOverlay();
		this.handleHealth();
		if (this.game.active) {
			this.update();
		}
		if (this.dead){
			const angle = (Math.atan2(this.game.player.y + 60 - this.y, this.game.player.x - this.x));
			for (let i = 0; i < this.xp; i ++){
	       		this.game.particles.push(new Particle(this.game, { 
	       			x: random(this.x - 10, this.x + this.w/2 + 5), 
	       			y: this.y + this.h - 48, 
	       			v: { x: Math.cos(angle) * 12, y: Math.sin(angle) * 12 },
	       			speed: 0,
	       			img: imgs.particles.xp, 
	       			sz: random(16, 32),
	       			xp: true,
	       			lifetime: 3000,
	       			applyGrav: true,
	       			target: this.game.player
	       		}));
	        }
		}
		this.healthTintTimer --;
	}
}

class Soul extends Enemy {
	constructor(game, config){
		config.type = 'soul';
		super(config);
		
		this.x = config.x;
		this.y = config.y;
		this.w = 76;
		this.h = 112;
		
		this.health = 20;
		
		this.v = { x: 0, y: 0 };
		this.speed = 2 + Math.random() * 3;
		this.range = { max: 15, min: 5, attack: 7, };
		
		this.cooldown = 90;
		
		this.game = game;
		this.loaded = false;
	}
	init(){
		if (!this.game.loading){
			
			this.frames = [imgs.enemies.soul_0, imgs.enemies.soul_1, imgs.enemies.soul_2, imgs.enemies.soul_3];
			this.animation = new AnimatedArt(this.frames, 10, true, { x: this.x, y: this.y });
			this.loaded = true;
		}
	}
	display(){
		if (this.animation){
			this.animation.offset.x = this.x;
			this.animation.offset.y = this.y;
			if (this.healthTintTimer > 0) {
		  		tint(255, 200, 200, 255);
		  	} else {
		  		tint(255, 255, 255, 255);
		  	}
			this.animation.display();
			noTint();
		} else {
			this.init()
		}

	}
	attack(angle){
		if (this.cooldown <= 0){
			for (let i = 0; i < 8; i ++){
	       		this.game.particles.push(new Particle(this.game, { 
	       			x: random(this.x - 10, this.x + this.w/2 + 5), 
	       			y: this.y + 10, 
	       			v: { x: Math.cos(angle) * 12, y: Math.sin(angle) * 12 },
	       			speed: 0,
	       			img: imgs.particles.soul_fire, 
	       			sz: random(32, 48), 
	       			animateSz: true,
	       			lifetime: 240,
	       			damage: 0.1,
	       			target: this.game.player
	       		}));
	        }
	        this.cooldown = 60;
		}
		
		this.cooldown --;
	}
	update(){
		const angle = (Math.atan2(this.game.player.y + 60 - this.y, this.game.player.x - this.x));
		const distance = Funcs.dist(this, this.game.player); 
		if (distance > this.range.min * BLOCKSIZE &&
			distance < this.range.max * BLOCKSIZE) {
			this.v.x = Funcs.lerp(this.v.x, Math.cos(angle) * this.speed, 0.05);
		} else {
			this.v.x = Funcs.lerp(this.v.x, 0, 0.05);
		}
		
		this.x += this.v.x;
		this.y += (Math.sin(angle) * this.speed);
		
		if (distance <= this.range.attack * BLOCKSIZE) this.attack(angle);
		if (this.dead){
			for (let i = 0; i < 36; i ++){
	       		this.game.particles.push(new Particle(this.game, { x: random(this.x - 10, this.x + this.w + 10), y: random(this.y + this.h/2, this.y + this.h), v: { x: random(-0.5, 0.5), y: random(-1, -0.1) }, speed: 0, img: imgs.particles.soul_fire, sz: random(16, 32), animateSz: true, }));
	        }
		}
	}
}

	}

		if (distance > this.range.min * BLOCKSIZE &&
			distance < this.range.max * BLOCKSIZE){
			this.v.x = (Math.cos(angle) * this.speed);
		} else {
			this.v.x = 0;

	   	this.handleAttack(distance, angle);

			} else if (this.dir === 'left') {
		        this.targetW = Funcs.lerp(this.targetW, -1, 0.1);
			}
		}
	}

		if (this.cooldown <= 0){
			this.rigs.head = Funcs.lerp(this.rigs.head, -20, 1);

			    this.game.deathMessage = 'was impaled by a Warpig';

			}
			this.cooldown = 90;
		} else if (this.cooldown <= 45) {
			this.rigs.head = -50;
		}
		this.cooldown --;
	}

		const distance = Funcs.dist(this, { ...this.game.player, x: this.game.player.x + this.game.player.w / 2, y: this.y});
		if (distance >= BLOCKSIZE * this.range.min &&
			distance <= BLOCKSIZE * this.range.max){
			this.inRange = true;
		} else {
			this.inRange = false;
		}
		if (distance <= BLOCKSIZE * this.range.min) this.attack();
		this.handleScale();
		this.x += this.v.x;
		if (this.inRange){
			if (this.game.player.x < this.x){
				this.v.x = -this.speed;
				
	            this.rigs.legs[0] = Math.sin(Funcs.degToRad(frameCount * 6)) * 30;
	            this.rigs.legs[1] = Math.sin(Funcs.degToRad(frameCount * 6)) * -30;
			} else if (this.game.player.x > this.x){
				this.v.x = this.speed;
				
	            this.rigs.legs[0] = Math.sin(Funcs.degToRad(frameCount * 6)) * 30;
	            this.rigs.legs[1] = Math.sin(Funcs.degToRad(frameCount * 6)) * -30;
			} else {
				this.v.x = 0;
				this.rigs.legs.forEach((leg, i) => this.rigs.legs[i] = Funcs.lerp(this.rigs.legs[i], 0, 0.1));
			}
		} else {
			this.v.x = 0;
			this.rigs.legs.forEach((leg, i) => this.rigs.legs[i] = Funcs.lerp(this.rigs.legs[i], 0, 0.1));
		}
		Collisions.apply(this.game, this, this.v.x, 0, {
			"blocks": { effect: 'collide' },
	    })
	    
	    this.y += this.v.y;
	    this.v.y += GRAV;
	    Collisions.apply(this.game, this, 0, this.v.y, {
			"blocks": { effect: 'collide' },
	    })
	}
}

class Magma extends Enemy {
	constructor(game, config){
		config.type = 'magma';
		super(config);
		
		this.x = config.x;
		this.y = config.y;
		
		this.game = game;
		
		this.szMultiplier = Math.max(1, Math.round(Math.random() * 3));
		this.w = BLOCKSIZE * this.szMultiplier;
		this.h = BLOCKSIZE * this.szMultiplier;
		
		this.health = 10 * this.szMultiplier;
		
		this.v = { x: 0, y: 0 };
		this.range = { max: 12, min: this.szMultiplier + 1, };
		this.jumpTimer = 120;
		this.speed = 1;
		this.targetX = this.game.player.x + random(0, this.game.player.w)
	}
	display(){
		if (this.healthTintTimer > 0) {
	  		tint(255, 100, 100, 255);
	  	} else {
	  		tint(255, 255, 255, 255);
		}
		imageMode(CORNER)
		image(imgs.enemies.magma, this.x, this.y, this.w, this.h);
		noTint();
	}
	update(){
		
		this.x += this.v.x;
		Collisions.apply(this.game, this, this.v.x, 0, {
			"blocks": { effect: 'collide' },
	    })
	    
	    // if (this.inRange){
	    if (this.jumpTimer <= 0 && !this.falling){
	       	this.v.y -= 12 * Math.max(1, this.szMultiplier / 1.5);
	       	this.falling = true;
	       	this.targetX = this.game.player.x + random(0, this.game.player.w)
	       	this.jumpTimer = 120;
	       	this.hit = false;
    	}
    	if (this.jumpTimer === 60){
	       	for (let i = 0; i < 8 * this.szMultiplier; i ++){
	       		this.game.particles.push(new Particle(this.game, { x: random(this.x - 10, this.x + this.w + 10), y: random(this.y + this.h/2, this.y + this.h), v: { x: random(-0.5, 0.5), y: random(-1, -0.1) }, speed: 0, img: imgs.particles.fire, sz: random(16, 32), animateSz: true, }));
	        }
    	}
    	if (Collisions.rectRect(this, this.game.player)){
    		if (this.v.y > 5 && !this.hit){
    			this.game.player.takeDamage(2 * this.szMultiplier)
    			for (let i = 0; i < 8 * this.szMultiplier; i ++){
		       		this.game.particles.push(new Particle(this.game, { 
		       			x: random(this.game.player.x - 10, this.game.player.x + this.game.player.w), 
		       			y: random(this.game.player.y + this.h/2, this.game.player.y + this.game.player.h),
		       			v: { x: random(-5, 5), y: random(-7, -2) }, 
		       			speed: 0, 
		       			img: get(this.game.player.x-this.game.player.w/2, this.game.player.y + 400, 20, 20),
		       			static: true,
		       			sz: random(16, 32), 
		       			animateSz: true, 
		       			applyGrav: true,
			   		}));
			    }
			    this.game.deathMessage = 'was crushed by a Magma';
    			this.hit = true;
    		}
    	}
	   	// }
	   	
	    if (this.x > this.targetX){
			this.v.x = -this.speed;
		} else if (this.x < this.targetX){
			this.v.x = this.speed;
		} else {
			this.v.x = 0;
		}
		
		if (this.falling){
			this.speed = 8;
		} else {
			this.speed = 1;
		}
		
	   	this.y += this.v.y;
	   	this.v.y += GRAV;
	   	Collisions.apply(this.game, this, 0, this.v.y, {
			"blocks": { effect: 'collide' },
	    })
	   	this.jumpTimer --;
	   	
	   	if (this.dead){
			for (let i = 0; i < 36; i ++){
	       		this.game.particles.push(new Particle(this.game, { x: random(this.x - 10, this.x + this.w + 10), y: random(this.y + this.h/2, this.y + this.h), v: { x: random(-0.5, 0.5), y: random(-1, -0.1) }, speed: 0, img: imgs.particles.fire, sz: random(16, 32), animateSz: true, }));
			}
	   	}
	}
}

class Enderscent extends Enemy {
	constructor(game, config){
		config.type = 'enderscent';
		super(config);
		
		this.x = config.x;
		this.y = config.y;
		this.w = BLOCKSIZE * 1.5;
		this.h = BLOCKSIZE * 6;
		
		this.targetW = 1;
		
		this.game = game;
		
		this.xp = 8;
		
		this.v = { x: 0, y: 0 };
		this.falling = false;
		this.speed = 18;
		this.range = { max: 12, min: 3, };
		this.inRange = false;
		
		this.fist = {
			x: 0,
			y: 0,
			w: 40,
			h: 40,
			hit: false,
			cooldown: 60,
			timer: 60,
		};
		
		this.rigs = {
			arms: [3, 0], // left, right
			legs: [0, 0], // left, right
		};
		
	}
	display(){
		pushMatrix();
		imageMode(CENTER);
		translate(this.x + this.w / 2, this.y);
		scale(-this.targetW, 1);
		
		// BODY
		image(imgs.enemies.enderscent_body, 0, 199);
		
		// ENDER EYE
		image(imgs.enemies.enderscent_eye, 0, 161, 60, 60);
		
		// HEAD
		image(imgs.enemies.enderscent_head, 0, 40);
		
		// LEGS
		
		// Left
		pushMatrix();
		translate(33, 323);
		rotate(this.rigs.legs[0]);
		
		image(imgs.enemies.enderscent_leg, -41, 118, 94, 272);
		popMatrix();
		
		// Right
		pushMatrix();
		translate(33, 323);
		rotate(this.rigs.legs[1]);
		
		image(imgs.enemies.enderscent_leg, -88, 118, 94, 272);
		popMatrix();
		
		// ARMS
		
		// Left
		pushMatrix();
		translate(-67, 79);
		rotate(this.rigs.arms[0]);
		
		image(imgs.enemies.enderscent_arm, 32, 120);
		popMatrix();
		
		// Right
		pushMatrix();
		translate(23, 79);
		rotate(this.rigs.arms[1]);
		
		image(imgs.enemies.enderscent_arm, 32, 120);
		popMatrix();
		
		
		popMatrix();
		noTint();
	}
	attack(){
		if (this.fist.cooldown <= 0){
			if (this.fist.timer <= 60 && this.fist.timer >= 30){
				this.fist.x = Funcs.lerp(this.fist.x, this.w/2, 0.1);
				this.fist.y = Funcs.lerp(this.fist.y, -40, 0.1);
				this.fist.hit = false;
				
				this.rigs.arms.forEach((arm, index) => this.rigs.arms[index] = Funcs.lerp(arm, 290, 0.05));
			} else if (this.fist.timer < 30){
				this.fist.x = Funcs.lerp(this.fist.x, Math.abs(this.game.player.x+10 - this.x) * round(this.targetW), 0.1);
				this.fist.y = Funcs.lerp(this.fist.y, this.game.player.y+this.game.player.h - this.y, 0.1);
		
				this.rigs.arms.forEach((arm, index) => this.rigs.arms[index] = Funcs.lerp(arm, -10, 0.1));
    			if (Collisions.rectRect({ x: this.fist.x + this.x, y: this.fist.y + this.y, w: 40, h: 40 }, this.game.player) && !this.fist.hit){
    				this.game.player.takeDamage(4);
    				for (let i = 0; i < 36; i ++){
			       		this.game.particles.push(new Particle(this.game, { 
			       			x: random(this.game.player.x - 10, this.game.player.x + this.game.player.w), 
			       			y: random(this.game.player.y + this.h/2, this.game.player.y + this.game.player.h), 
			       			v: { x: random(-5, 5), y: random(-7, -2) }, 
			       			speed: 0, 
			       			img: get(this.game.player.x + this.game.player.w / 2, this.game.player.y + 400, 20, 20), 
			       			sz: random(16, 32), 
			       			animateSz: true, 
			       			applyGrav: true,
			       		}));
			        }
			        
			    	this.game.deathMessage = 'was pulverized by an\nEnderscent';
    				this.fist.hit = true;
    			}
    		}
    		
			this.fist.timer --;
		}
		
		if (this.fist.timer <= 0){
			this.fist.cooldown = 90;
			this.fist.timer = 60;
			this.speed = 6;
			
			// this.rigs.arms[0] = Funcs.lerp(this.rigs.arms[0], 0, 0.1);
		}
		this.fist.cooldown --;
	}
	handleScale(){
		this.dir = this.game.player.x < this.x ? "left" : "right";
		if (this.dir === 'right'){
	        this.targetW = Funcs.lerp(this.targetW, 1, 0.1);
		} else if (this.dir === 'left') {
	        this.targetW = Funcs.lerp(this.targetW, -1, 0.1);
		}
	}
	update(){
		const distance = Funcs.dist(this, { ...this.game.player, x: this.game.player.x + this.game.player.w / 2 });
		if (distance > BLOCKSIZE * this.range.min &&
			distance < BLOCKSIZE * this.range.max){
			this.inRange = true;
		} else {
			this.inRange = false;
		}
		if (this.inRange) {
			if (this.x > this.game.player.x){
				this.v.x = -this.speed;
				
	            this.rigs.legs[0] = Math.sin(Funcs.degToRad(frameCount * 3)) * -15;
	            this.rigs.legs[1] = Math.sin(Funcs.degToRad(frameCount * 3)) * 15;
			} else if (this.x < this.game.player.x){
				this.v.x = this.speed;
				
				
	            this.rigs.legs[0] = Math.sin(Funcs.degToRad(frameCount * 3)) * -15;
	            this.rigs.legs[1] = Math.sin(Funcs.degToRad(frameCount * 3)) * 15;
			}
		} else {
			this.v.x = 0;
		}
		this.x += this.v.x;
		Collisions.apply(this.game, this, this.v.x, 0, {
			"blocks": { effect: 'collide' },
	    })
	    
	    // if (this.inRange){
	        if (Math.abs((this.game.player.y + this.game.player.h) - (this.y + this.h)) >= BLOCKSIZE){
				 	if (!this.falling){
			        	this.v.y -= 12;
			        	this.falling = true;
				 	}
		        }
	   	// }
	   	this.y += this.v.y;
	   	this.v.y += GRAV;
	   	Collisions.apply(this.game, this, 0, this.v.y, {
			"blocks": { effect: 'collide' },
	    })
	   	
	 	
		this.handleScale();
		if (distance <= BLOCKSIZE * this.range.min * 2) this.attack();
	   	// println(this.game.player.y - this.y < 136 ? true : false)
	}
}


class FloatingText {
	constructor(config){
		this.txt = config.txt;
		this.sz = config.sz;
		this.clr = config.clr || 'white';
		
		this.x = config.x;
		this.y = config.y;
		
		this.opacity = 0;
	}
	display(){
		ctx.fillStyle = this.clr;
		ctx.globalAlpha = this.opacity;
		Display.text(this.txt, this.x, this.y + (Math.sin(Funcs.degToRad(frameCount * 3)) * 5), '', this.sz, 'Silkscreen', 24, 'center');
		ctx.globalAlpha = 1;
	}
	fadeIn(){
		this.opacity = Funcs.lerp(this.opacity, 1, 0.1);
	}
	fadeOut(){
		this.opacity = Funcs.lerp(this.opacity, 0, 0.1);
	}
}

class Block {
	constructor(game, config){
		this.executable = 'display';
		
		this.x = config.x || 0;
		this.y = config.y || 0;
		
		this.noCollide = ['warped_wart', 'warped_stem', 'crimson_stem', 'crimson_wart', 'fire', 'lava', 'soul_fire'];
		this.animated = ["fire", 'soul_fire'];
		this.type = config.type;
		
		this.game = game;
		
		this.passThrough = this.noCollide.includes(this.type);
		if (this.type === 'shrine_floor'){
			this.w = 600;
			this.h = 165;
		} else {
			this.w = BLOCKSIZE;
			this.h = BLOCKSIZE;
		}
		
		if (this.animated.includes(this.type)){
			this.img = new Fire({ ...this, type: this.type.startsWith('soul') ? 'soul' : 'regular' });
		}
		
		if (this.type === 'pedestal'){
			this.text = new FloatingText({ txt: "Press E to open puzzle", x: this.x + 100, y: this.y - 12 });
		}
	}
	
	// Initalize animation so frames are images, not functions
	initAnimation(){		
		this.frames = Array.from({ length: 6, }, (_, i) => imgs.blocks[`fire_${i}`]);
		this.animation = new AnimatedArt(this.frames, 5, false, { x: this.x, y: this.y }, BLOCKSIZE, BLOCKSIZE);
	}
	display(){
		if (!this.animated.includes(this.type)){
			imageMode(CORNER)
			image(imgs.blocks[this.type], this.x, this.y, this.type === 'pedestal' ? undefined : this.w, this.type === 'pedestal' ? undefined : this.h);
		} else {
			this.img.display();
		}
		
		if (this.type === 'pedestal'){
			if (Funcs.dist(this, this.game.player) <= 200){
				this.text.fadeIn();
				if (keys.press('interact') && this.game.enemies.length === 0){
					Levels[this.game.level].shrine(this.game, Blaze);
					this.game.inShrine = true;
				}
			} else {
				this.text.fadeOut();
			}
			this.text.display();
		}
		
		// Funcs.hitbox(this)
	}
}

			const card = new UpgradeCard(this, { x: 69 + i * 270, y: 142, upgrade: this.upgradesList[index], num: i + 1 });

			this.update();
		} else {
			this.reset();
			this.reload();
			this.init = true;
		}
	}

		this.game = game;

		this.buttons.forEach((button, index) => {

			button.index = index;

			if (button.selected){
				button.x = Funcs.lerp(button.x, this.x + 20, 0.1);
				if (keys.press("enter")){
					button.action();
				}
			} else {
				button.x = Funcs.lerp(button.x, this.x, 0.1);
			}
		});
		
		if (this.cooldown <= 0){
			if (keys.press("buttonUp") && this.selected > 0){
				this.selected --;
				this.cooldown = 10;
			} else if (keys.press("buttonDown") && this.selected < this.buttons.length - 1){
				this.selected ++;
				this.cooldown = 10;
			}
		}
		this.arrowY = Funcs.lerp(this.arrowY, this.y + this.selected * 31, 0.1);
		
		this.cooldown --;
	}

class Camera {
    constructor(game, target){
        this.target = target;
        this.x = target.x || 0;
        this.y = target.y || 0;
        
        this.behavior = 'smooth';
        this.zoom = 0.4;
        this.speed = 0.1;
        this.angle = 0;
        this.game = game;
    }
    start(){
        pushMatrix();
        translate(width / 2, height / 2);
        scale(this.zoom);
        translate(-this.x, -this.y)
        rotate(this.angle);
    }
    end(){
        popMatrix();
    }
    handleZoom(){
        if (keys.press("zoomOut")){
        	this.zoom -= 0.01;
        } else if (keys.press("zoomIn")){
        	this.zoom += 0.01;
        }
        
        this.zoom = constrain(this.zoom, 0.4, 1);
    }
    follow(){
        const targetX = this.target.x + this.target.w / 2;
        const targetY = this.target.y - this.target.h / 2 + height/2;
        if (this.behavior === 'smooth') {
	        this.x = Funcs.lerp(this.x, targetX, this.speed);
            this.y = Funcs.lerp(this.y, targetY, this.speed);
        } else if (this.behavior === 'static') {
            this.x = targetX;
            this.y = targetY;
        }
        
	        this.x = constrain(this.x, (width/2) / this.zoom, Levels[this.game.level].map[0].length * BLOCKSIZE - width / (2*this.zoom));
	        this.y = constrain(this.y, 0, Levels[this.game.level].map.length * BLOCKSIZE - height / (2*this.zoom));
	        // println((Levels[this.game.level].map.length * BLOCKSIZE - height * 2) / this.zoom)
	    this.angle = lerp(this.angle, 0, 0.1);
    }
    run(){
    	this.handleZoom();
    	this.follow();
    }
}

class Game {
	constructor(config){
		this.scene = config.scene;
		this.sceneTo = config.scene;
		this.debug = config.debug;
		
		this.level = parseInt(localStorage.getItem("level")) || 0 || this.debug?.level;
		this.map = Levels[this.level].map;
		this.sector = 0;
		this.sectorMap = {
			0: "wastes",
			1: "souls",
			2: "crimson",
			3: "basalt",
			4: "warped",
			5: "shrine",
		};
		this.stringSector = {
			0: "Nether Wastes",
			1: "Soul Sand Valleys",
			2: "Crimson Forest",
			3: "Basalts",
			4: "Warped Forest",
			5: "Shrine",
		};
		
		this.xpGoals = [50, 150, 500, 1000, 2000];
		
		this.player = new Player(this, { x: 47, y: 0 })
		this.camera = new Camera(this, this.player);
		// this.inShrine = true;
		this.upgradeSet = new UpgradeSet(this);
		
		this.active = false;
		
		this.menuButtons = new ButtonSet(this, {
			x: 62,
			y: 465,
			buttons: [
				new Button({
					txt: "Load Save",
					action: () => this.sceneTo = 'game',
				}),
				new Button({
					txt: "New Game",
					action: () => {
						localStorage.clear();
						this.level = 0;
						this.player.clear();
						this.sceneTo = 'game';
					},
				}),
				new Button({
					txt: "Tutorial",
					action: () => this.sceneTo = 'tutorial',
				}),
			],
		});
		
		this.restartButtons = new ButtonSet(this, {
			x: 62,
			y: 458,
			buttons: [
				new Button({
					txt: "Menu",
					action: () => this.sceneTo = 'menu',
				}),
				new Button({
					txt: "Replay",
					action: () => {
						this.player.reset();
						this.loadLevel();
						this.debug.skipTransitions = true;
						this.level = 0;
						this.sceneTo = 'game'
					},
				}),
			],
		});
		
		this.backButtons = new ButtonSet(this, {
			x: 62,
			y: 458,
			buttons: [
				new Button({
					txt: "Back",
					action: () => this.sceneTo = 'menu',
				}),
				new Button({
					txt: "Play",
					action: () => this.sceneTo = 'game',
				}),
			],
		});
		
		this.deathMessage = 'was killed';
		this.deathButtons = new ButtonSet(this, {
			x: 384,
			y: 302,
			buttons: [
				new Button({
					txt: "Respawn",
					action: () => { this.player.reset(true); this.loadLevel(); },
				}),
				new Button({
					txt: "Menu",
					action: () => this.sceneTo = 'menu',
				}),
			],
		});
		this.UI = {
			hud: () => {
					// LEVEL
					ctx.fillStyle = 'white';
					Display.text(`${this.stringSector[this.sector]}`, 60, 59, 'bold', 28);
					Display.text(`Level ${this.level + 1}`, 60, 89, 'bold', 24);
					
					// XP
					Display.text(`${round(this.player.xp)}x`, 525, 80, 'bold', 28, 'Silkscreen', 24, 'right');
					
					Display.text(`${this.player.level} xp levels`, 889, 138, 'bold', 28, 'Silkscreen', 24, 'right');
					image(imgs.particles.xp, 551 + Math.cos(Funcs.degToRad(frameCount * 5)) * 3, 56 + Math.sin(Funcs.degToRad(frameCount * 5)) * 3, 30, 30);
					image(imgs.particles.xp, 556 + Math.cos(Funcs.degToRad(frameCount * 5)) * -5, 51 + Math.sin(Funcs.degToRad(frameCount * 5)) * -5, 30, 30);
					
					noFill();
					strokeWeight(7);
					stroke(255);
					rect(618, 42, 264, 50);
					
					fill(255);
					rect(618, 42, map(this.player.displayXp, 0, this.xpGoals[this.player.level], 0, 264), 50);
					
					// HEARTS
					pushMatrix();
					translate(70, -20)
					let offsetX = 0;
					let offsetY = 0;
					for (let i = 0; i < Math.floor(this.player.maxHealth / 2); i ++){
				        let shakeY = (sin(frameCount) * 5) + random(-4, 2);
				        let roundedHealth = Math.floor(this.player.displayHealth);
				        let halfHeart = !(Math.abs(this.player.displayHealth - roundedHealth) <= 0.5 && i === roundedHealth);
				        let y = 545 + (this.player.health <= 4 ? shakeY : 0) + offsetY;
				        let flash = this.player.healthFlashTimer > 0;
				        
				        if (!halfHeart){
				            image(flash ? imgs.hearts.flash_half_heart : imgs.hearts.half_heart, offsetX, y);
				        } else if (i > this.player.displayHealth) {
				           image(flash ? imgs.hearts.flash_loss_empty_heart : imgs.hearts.empty_heart, offsetX, y);
				        } else {
				            image(this.player.healthFlashTimer > 0 ? imgs.hearts.flash_heart : imgs.hearts.heart, offsetX, y);  
				        }
				        offsetX += 32;
				        if (offsetX > 289){
				        	offsetX = 0;
				        	offsetY -= 32;
				        }
				    }
				    popMatrix()
			},
			death: () => {
				fill(255, 0, 0, 100)
				rect(0, 0, width, height)
				
				ctx.fillStyle = 'white'
				Display.text("You died!", width/2, 140, 'bold', 36, 'Silkscreen', 24, 'center')
				Display.text(`Ghastling ${this.deathMessage}`, width/2, 198, '', 24, 'Silkscreen', 24, 'center')
				
		
				Display.text('J/K to select', 700, 557, '', 18);
				
				this.deathButtons.display();
				this.deathButtons.update();
			},
		};
		
		this.curLoad = 0;
		this.loading = true;
		this.imgLen = 0;
		Object.keys(imgs).forEach(category => {
			Object.keys(imgs[category]).forEach(img => {
				this.imgLen ++;
			});
		});
		
		this.blockMap = {
		    "n" : "netherrack",
		    "s" : "soul_sand",
		    "l" : "soul_soil",
		    "b" : "basalt",
		    "w" : "warped_nylium",
		    "t" : "warped_stem",
		    "r" : "warped_wart",
		    "~" : "lava",
		    "g" : "gravel",
		    "f" : "fire",
		    ":" : "shrine_floor",
		    "." : "pedestal",
		    "c" : "crimson_nylium",
		    "y" : "crimson_wart",
		    "o" : "crimson_stem",
		};
		this.enemyMap = {
			"#" : "magma",
			"!" : "enderscent",
			"$" : "soul",
			";" : "blaze",
			"&" : "warpig",
		};
		
		const self = this;
		this.levelTransition = {
			timer: 0,
			titleTimer: 0,
			titleDir: 1,
			dir: 1,
			messageIndex: 0,
			messages: Array.from({ length: Levels[self.level].messages.length }, (_, i) => { return { txt: Levels[self.level].messages[i], dir: 1, active: false, timer: 0, } }),
			done: false,
			reset: function(){
				this.done = false;
				this.dir = 1;
				this.titleDir = 1;
				this.messages = Array.from({ length: Levels[self.level].messages.length }, (_, i) => { return { txt: Levels[self.level].messages[i], dir: 1, active: false, timer: 0, } });
				this.timer = 0;
				this.titleTimer = 0;
			},
			run: function(){
				fill(0, map(this.timer, 0, 60, 0, 255));
				rect(0, 0, width, height);
				
				if (this.titleTimer > 0){
					ctx.globalAlpha = map(this.titleTimer, 0, 60, 0, 1);
					ctx.fillStyle = 'white'
					Display.text(`${Levels[self.level].title}`, width/2, height/2 - 24, 'bold', 36, 'Silkscreen', 24, 'center');
					Display.text(`Level ${self.level + 1}`, width/2, height/2 + 32, 'bold', 24, 'Silkscreen', 24, 'center');
				}
				ctx.globalAlpha = 1;
				if (this.timer === 90 + Levels[self.level].transitionOffset && this.dir === 1){
					this.dir = -1;
					this.timer = 120;
				}
				if (this.titleTimer === 60 && this.titleDir === 1){
					this.titleDir = -1;
				}
				if (this.timer <= 0 && this.dir === -1) {
					this.done = true;
				} else {
					this.done = false;
				}
				this.messages.forEach((msg, index) => {
					if (this.titleDir === -1 && this.timer >= 120){
						ctx.fillStyle = 'white';
						if (this.timer > index * 240 + 20 && this.timer < index * 240 + 120){
							Display.text(`${msg.txt}`, width/2, height/2, '', 24, 'Silkscreen', 24, 'center');
						}
						if (msg.timer === 60 && msg.dir === 1){
							msg.dir = -1;
						}
						msg.timer += msg.dir;
					}
				});
				// println(this.timer)
				this.titleTimer += this.titleDir;
				this.timer += this.dir;
			},
		};
		this.transition = {
			animationStage: 0,
			anim: 0,
			run: function(){
				if (this.animationStage === 0) {
		            this.anim = lerp(this.anim, 270, 0.1);
		            if (this.anim > 260) {
		                self.scene = self.sceneTo;
		                this.animationStage = 1;
		            }
		        } else {
		            this.anim = lerp(this.anim, -10, 0.1);
		            if (this.anim < 0) {
		                this.anim = 0;
		                this.animationStage = 0;
		                self.sceneTo = false;
		            }
		        }
		
				noStroke()
		        fill(0, this.anim);
		        rectMode(CORNER);
		        rect(0, 0, width, height);
			},
		};
		
		this.particles = [];
		this.blocks = [];
		this.enemies = [];
		this.shrines = [];
		this.projectiles = [];
		this.resetObjs();
	}
	loadImgs(){
		Object.keys(imgs).forEach(category => {
			Object.keys(imgs[category]).forEach(key => {
				imgs[category][key] = imgs[category][key]()
				this.curLoad ++;
			});
		});
		
		if (this.curLoad >= this.imgLen) {
			this.loading = false;
		}
        
       	background(0)
        pushStyle();
            noFill();
            strokeWeight(10);
            strokeCap(SQUARE);
            stroke(255);
            arc(width / 2, height / 2, 300, 300, 0, this.curLoad * 100);
        popStyle();
        
        fill(255);
        textFont(createFont("sans-serif"), 49);
        textAlign(CENTER, CENTER);
        text("Loading...", width / 2, 100);
	}
	resetObjs(){
		this.enemies = [], this.blocks = [], this.shrines = [], this.particles = [], this.projectiles = [];
		this.objs = [this.shrines, this.blocks, this.projectiles, this.particles, this.enemies];
	}
	runObjs(){
		this.objs.forEach(arr => {
			arr.forEach((obj, index) => {
				obj[obj.executable]();
				if (obj.dead){
					arr.splice(index, 1)
				}
			});
		});
	}
	loadLevel(dir){
		if (dir){
			this.level = parseInt(this.level) || 0;
			if (this.level < Levels.length - 1) {
				this.level += dir;
				localStorage.setItem("level", this.level);
				
		println(localStorage.getItem("level"));
			} else if (dir > 0) {
				this.sceneTo = 'win';
			}
		}
		const level = Levels[this.level];
		this.map = level.map;
		this.sector = level.sector;
		
		this.resetObjs();
		
		this.map.map((row, y) => {
			row.split("").map((char, x) => {
				const X = x * BLOCKSIZE;
				const Y = y * BLOCKSIZE;
				
				if (char !== " "){
					if (char in this.blockMap){
						this.blocks.push(new Block(this, { x: X, y: Y, type: this.blockMap[char] }))
					} else if (char === "$"){
						this.enemies.push(new Soul(this, { x: X, y: Y  }))
					} else if (char === "!"){
						this.enemies.push(new Enderscent(this, { x: X, y: Y - BLOCKSIZE * 5, }))
					} else if (char === "#"){
						this.enemies.push(new Magma(this, { x: X, y: Y - BLOCKSIZE * 2 }))
					} else if (char === ";"){
						this.enemies.push(new Blaze(this, { x: X, y: Y - 96 }))
					} else if (char === "&"){
					    this.enemies.push(new Warpig(this, { x: X, y: Y }))
					} else if (char === "?"){
						this.shrines.push(new Shrine(this, { x: X, y: Y - 30, } ));
					} else if (char == "@"){
						this.player.setX = X + 1;
						this.player.setY = Y - BLOCKSIZE;
						this.player.x = X + 1;
						this.player.y = Y - BLOCKSIZE;
					}
				}
			});
		});
		
		this.player.reset();
		if (dir === 1 || this.level === 0) this.levelTransition.reset();
	}
	run(){
		if (this.loading){
			this.loadImgs();
		} else {
			Scenes[this.scene](this);
			if (this.sceneTo) this.transition.run();
			if (!this.debug.skipTransition && this.scene === 'game') this.levelTransition.run();
		}
		mouse.update()
		keys.update()
	}
}

const game = new Game({
	scene: "game",
	debug: {
		hitboxes: true,
		level: 0,
		skipTransition: !false,
		onePunch: !true,
	},
})
game.loadLevel()
game.player.reset()
draw = function(){
	game.run();
};
